[project]
name = "fastapi-crud"
version = "0.1.0"
requires-python = ">=3.12"

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",
    "F",
    "W",
    "I",
    "UP",
    "B",
    "SIM",
    "N",
    "ANN",
    "RUF"
]

ignore = [
    "ANN101",
    "ANN102",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
